<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>user1::등록</title>
        <script>
            document.addEventListener('DOMContentLoaded', function(){
                const form = document.formUser;

                form.addEventListener('submit', function(e){
                    e.preventDefault();
                    
                    const jsonData = {
                        "userid": this.userid.value,
                        "name": this.name.value,
                        "hp": this.hp.value,
                        "age": this.age.value
                    };

                    console.log(jsonData);

                   
                    fetch('http://localhost:8080/ch08/user1', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(jsonData)
                    })
                    .then(response => response.json())
                    .then(data => {
                        console.log(data);
                        alert(data.name + "님을 추가 했습니다.");
                        location.href = 'list.html'; // 등록 후 목록 페이지로 이동
                    })
                    .catch(err => {
                        console.error('등록 실패:', err);
                    });
                });
            });
        </script>
    </head>
    <body>
        <h3>User1 등록</h3>
        <a href="list.html">목록</a>
        
        <form name="formUser" method="post">
            <table border="1">
                <tr>
                    <td>아이디</td>
                    <td><input type="text" name="userid"></td>
                </tr>
                <tr>
                    <td>이름</td>
                    <td><input type="text" name="name"></td>
                </tr>
                <tr>
                    <td>휴대폰</td>
                    <td><input type="text" name="hp"></td>
                </tr>
                <tr>
                    <td>나이</td>
                    <td><input type="number" name="age"></td>
                </tr>
                <tr>                    
                    <td colspan="2" align="right">
                        <input type="submit" value="등록하기">
                    </td>
                </tr>           
            </table>        
        </form>     
    </body>
</html>
