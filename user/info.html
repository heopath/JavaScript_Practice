<!DOCTYPE html>
<html xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
	<head>
		<meta charset="UTF-8">
		<title>사용자 정보</title>
		<script>

			document.addEventListener('DOMContentLoaded', function(){

			 	const logout = document.getElementById('logout');

				logout.addEventListener('click', async function(e){
					e.preventDefault();

					// 로그아웃 요청
					try {
						const response = await fetch('http://127.0.0.1:8080/ch09/logout', {
							method: 'GET',
							credentials: 'include'
						});
						const data = await response.json();
						console.log(data);
					}catch(err){
						console.log(err);
					}

				});
			});
		</script>
	</head>
	<body>
		<h3>사용자 정보</h3>
		
		<a href="#" id="logout">로그아웃</a>
		
		<p>
			아이디 : <span></span><br>
			이름 : <span></span><br>
			생년월일 : <span>생년월일</span><br>
			나이 : <span>나이</span><br>
			회원등급 : <span></span><br>
			가입일 : <span></span><br>
		</p>
	</body>
</html>
