<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8">
		<title>회원가입</title>
		<script>

			document.addEventListener('DOMContentLoaded', function(){


				const form = document.formUser;

				form.addEventListener('submit', async function(e){
					e.preventDefault();

					// 폼 데이터를 JSON 생성
					const jsonData = Object.fromEntries(new FormData(this));

					console.log(jsonData);
					
					const response = await fetch('http://127.0.0.1:8080/ch09/user', {
						method: 'POST',
						headers: {
							'Content-Type': 'application/json'
						},
						body: JSON.stringify(jsonData)
					});
					const data = await response.json();
					console.log(data);

					if(data){
						alert(data.name + "님을 등록했습니다.");
						location.href = './login.html';
					}
				});
			});
		</script>
	</head>
	<body>
		<h3>회원가입</h3>

		<a href="./login.html">로그인</a>
		
		<form name="formUser" method="post">
			<table border="1">
				<tr>
					<td>아이디</td>
					<td><input type="text" name="userid"></td>
				</tr>
				<tr>
					<td>비밀번호</td>
					<td><input type="password" name="pass"></td>
				</tr>
				<tr>
					<td>이름</td>
					<td><input type="text" name="name"></td>
				</tr>
				<tr>
					<td>생년월일</td>
					<td><input type="date" name="birth"></td>
				</tr>
				<tr>
					<td>나이</td>
					<td><input type="number" name="age"></td>
				</tr>
				<tr>
					<td>권한</td>
					<td>
						<select name="role">
							<option value="ADMIN">최고관리자</option>
							<option value="MANAGER">관리자</option>
							<option value="MEMBER">회원</option>
							<option value="GUEST">손님</option>
						</select>
					</td>
				</tr>
				<tr>					
					<td colspan="2" align="right">
						<input type="submit" value="등록하기">
					</td>
				</tr>			
			</table>		
		</form>		
	</body>
</html>
