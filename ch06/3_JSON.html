<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3_JSON</title>
</head>
<body>
    <h3>3.JSON(JavaScript Object Notation)</h3>
    <script>
        // JavaScript 객체
        const kim = {
            userid: 'a101',
            name: '김유신',
            age: 25,
            addr: '김해'
        };

        // JSON 객체
        const lee = {
            "userid": "a102", // 키값이 큰타옴표 문자열
            "name": "이순신",
            "age": 35,
            "addr": "부산"
        };

        document.write(kim);
        document.write('아이디 : ' + kim.userid + '<br>');
        document.write('이름 : ' + kim.name + '<br>');
        document.write('나이 : ' + kim.age + '<br>');
        document.write('주소 : ' + kim.addr + '<br>');
        
        
        document.write(lee);
        document.write('아이디 : ' + lee.userid + '<br>');
        document.write('이름 : ' + lee.name + '<br>');
        document.write('나이 : ' + lee.age + '<br>');
        document.write('주소 : ' + lee.addr + '<br>');
        
        // JSON 배열
        const jsonArray = {"persons": [
            {"userid": "a101", "name": "김유신", "birth": "1990-01-02", "age": 25},
            {"userid": "a102", "name": "김춘추", "birth": "1991-01-02", "age": 21},
            {"userid": "a103", "name": "장보고", "birth": "1992-01-02", "age": 45},
            {"userid": "a104", "name": "강감찬", "birth": "1993-01-02", "age": 55},
            {"userid": "a105", "name": "이순신", "birth": "1994-01-02", "age": 65}
        ]};

        for(const person of jsonArray.persons){
            document.write('<p>');
            document.write(person.userid + '<br>'); 
            document.write(person.name + '<br>'); 
            document.write(person.birth + '<br>'); 
            document.write(person.age + '<br>'); 
            document.write('</p>');
        }

        // JSON 내장함수
        const product = {
            "prodNo": 101,
            "prodName": "노트북",
            "price": 1_500_000,
            "stock": 20,
            "company": {
                "name":"samsung",
                "tel":"02-120-1001"
            }
        }

        // document.write(product);

        // stringify() - JSON 객체를 문자열로 변환
        const jsonString = JSON.stringify(product);
        document.write(jsonString);
        document.write(jsonString.prodName); // undefined

        // parse() - JSON 문자열을 JSON 객체로 변환
        const parsedJson = JSON.parse(jsonString);
        document.write(parsedJson); // [object Object] 출력
        document.write(parsedJson.prodName);

    </script>

</body>
</html>
