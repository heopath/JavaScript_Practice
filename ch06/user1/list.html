<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>5_HTTP통신</title>
    <script>
        document.addEventListener('DOMContentLoaded', function () {

            const user1 = document.getElementsByClassName('user1')[0];

            // User1 데이터 요청하기
            fetch('http://localhost:8080/ch09/user1/list.do?mode=json')
                .then((response) => { return response.json() })
                .then((data) => {
                    console.log(data);

                    for (const user of data) {
                        const html = `<tr>
                                            <td>${user.userid}</td>
                                            <td>${user.name}</td>
                                            <td>${user.hp}</td>
                                            <td>${user.age}</td>
                                            <td>
                                                <a href='./modify.html?userid=${user.userid}'>수정</a>
                                                <a href='#' class='del' data-userid='${user.userid}'>삭제</a>
                                            </td>
                                        </tr>`;
                        user1.insertAdjacentHTML('beforeend', html);
                    }
                })
                .catch((err) => {
                    console.log(err);
                });

            // 삭제 요청하기
            const dels = document.getElementsByClassName('del');

            // 동적 이벤트 처리
            document.addEventListener('click', async function (e) {

                if (e.target.classList.contains('del')) {
                    e.preventDefault();

                    const userid = e.target.dataset.userid;

                    const params = `mode=json&userid=${userid}`;

                    if (confirm(userid + ' 사용자를 정말 삭제하시겠습니까?')) {
                        try {
                            const response = await fetch(`http://localhost:8080/ch09/user1/delete.do?${params}`, {
                                method: 'GET'
                            });
                            const data = await response.json(); // 서버에서 {"result": 1} 형태의 응답을 기대

                            if (data.result > 0) {
                                alert('삭제 성공!');

                                // 🌟 팁: 클릭된 삭제 버튼에서 가장 가까운 tr 태그를 찾아서 화면에서 제거
                                e.target.closest('tr').remove();
                            } else {
                                alert('삭제 실패!');
                            }
                        } catch (error) {
                            console.error('삭제 통신 중 에러 발생', error);
                        }
                    }
                }

            });

        });

    </script>
</head>

<body>
    <h3>User1 AJAX 실습</h3>

    <a href="./list.html">목록</a>
    <a href="./register.html">등록</a>
    <table class="user1" border="1">
        <tr>
            <th>아이디</th>
            <th>이름</th>
            <th>휴대폰</th>
            <th>나이</th>
            <th>관리</th>
        </tr>
    </table>

</body>

</html>
