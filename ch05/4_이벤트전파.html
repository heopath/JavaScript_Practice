<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4_이벤트전파</title>
</head>
<body>
    <h3>4.이벤트전파</h3>
    <style>
        div {
            padding: 10px;
        }
        .box1 {
            width: 300px;
            height: 300px;
            border: 1px solid red;

        }
        .box2 {
            width: 200px;
            height: 200px;
            border: 1px solid green;
        }
        .box3 {
            width: 100px;
            height: 100px;
            border: 1px solid blue;
        }
    </style>
    <script>

        document.addEventListener('DOMContentLoaded', function(){

            const box1 = document.getElementsByClassName('box1');
            const box2 = document.getElementsByClassName('box2');
            const box3 = document.getElementsByClassName('box3');

            // 이벤트 버블링
            box1[0].addEventListener('click', function(e){
                console.log('box1 click...');
            });
            box2[0].addEventListener('click', function(e){
                console.log('box2 click...');      
            });
            box3[0].addEventListener('click', function(e){
                // 이벤트 전파 차단
                e.stopPropagation();
                console.log('box3 click...');
            });

            // 이벤트 캡쳐링
            box1[1].addEventListener('click', function(e){
                console.log('box1 click...');
            }, true); // 캡쳐링 활성화
            box2[1].addEventListener('click', function(e){
                console.log('box2 click...');
            }, true);
            box3[1].addEventListener('click', function(e){
                e.stopPropagation(); // 캡쳐링에서는 전파차단 의미없음
                console.log('box3 click...'); 
            }, true);

        })


    </script>
    
    <h4>버블링</h4>
    <div class="box1">box1
        <div class="box2">box2
            <div class="box3">box3</div>
        </div>
    </div>

    <h4>캡쳐링</h4>
    <div class="box1">box1
        <div class="box2">box2
            <div class="box3">box3</div>
        </div>
    </div>

</body>
</html>
